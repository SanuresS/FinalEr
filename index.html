<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Engineer — Курс</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        bg: '#0B0F19',
                        accent: {
                            purple: '#8B5CF6',
                            blue: '#3B82F6',
                            cyan: '#06B6D4',
                        },
                    },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0B0F19;
            font-family: 'Inter', sans-serif;
        }

        .grid-bg {
            background-image:
                linear-gradient(rgba(139, 92, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #60A5FA, #06B6D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary {
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        .avatar-ring {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            padding: 3px;
            border-radius: 9999px;
        }

        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s ease forwards;
        }
        .fade-up-delay-1 { animation-delay: 0.1s; }
        .fade-up-delay-2 { animation-delay: 0.25s; }
        .fade-up-delay-3 { animation-delay: 0.4s; }
        .fade-up-delay-4 { animation-delay: 0.55s; }
        .fade-up-delay-5 { animation-delay: 0.7s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen grid-bg text-white overflow-x-hidden">

    <!-- Header -->
    <header class="w-full max-w-5xl mx-auto px-5 sm:px-8 pt-6 sm:pt-10 flex items-center justify-between fade-up fade-up-delay-1">
        <div class="flex items-center gap-3">
            <div class="avatar-ring">
                <div class="w-10 h-10 sm:w-11 sm:h-11 rounded-full bg-[#0B0F19] flex items-center justify-center">
                    <span class="text-sm sm:text-base font-bold gradient-text">ML</span>
                </div>
            </div>
            <span class="text-sm sm:text-base font-semibold text-white/90 tracking-wide">ML Engineer</span>
        </div>
        <button class="w-9 h-9 sm:w-10 sm:h-10 rounded-full border border-white/10 flex items-center justify-center hover:border-white/30 hover:bg-white/5 transition-all duration-300" aria-label="Toggle theme">
            <svg class="w-4 h-4 sm:w-5 sm:h-5 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z" />
            </svg>
        </button>
    </header>

    <!-- Hero Section -->
    <main class="flex flex-col items-center justify-center text-center px-5 sm:px-8 pt-16 sm:pt-24 md:pt-32 pb-20">

        <!-- Title -->
        <h1 class="fade-up fade-up-delay-2 text-4xl sm:text-5xl md:text-7xl font-black tracking-tight leading-none mb-5 sm:mb-6">
            ML-инженер
        </h1>

        <!-- Subtitle -->
        <p class="fade-up fade-up-delay-3 gradient-text text-lg sm:text-xl md:text-2xl font-bold mb-6 sm:mb-8 max-w-xl leading-snug">
            Который обучает, а не просто кодит
        </p>

        <!-- Description -->
        <p class="fade-up fade-up-delay-4 text-white/50 text-sm sm:text-base md:text-lg leading-relaxed max-w-2xl mb-10 sm:mb-12">
            Machine Learning Engineer создает интеллект, который меняет реальность.
            Нейросети, предсказательные модели, Big Data — всё под твоим контролем.
        </p>

        <!-- Buttons -->
        <div class="fade-up fade-up-delay-5 flex flex-col sm:flex-row items-center gap-4">
            <a href="#skills" class="btn-primary w-full sm:w-auto px-8 py-3.5 rounded-xl text-white font-semibold text-sm sm:text-base flex items-center justify-center gap-2">
                Навыки и инструменты
            </a>
            <a href="#career" class="btn-secondary w-full sm:w-auto px-8 py-3.5 rounded-xl text-white/80 font-medium text-sm sm:text-base flex items-center justify-center gap-3">
                Карьерный путь
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                </svg>
            </a>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
